<div id="app" class="container">
  <div class="item">
    <div class="part image" @click="nextSlide">
      <image-slide>
        <div class="image-slide" :style="slideImage" :key="activeSlide"></div>
      </image-slide>
    </div> 
    <div class="part text">
      <text-slide>
        <div class="inner" :key="activeSlide">
          <div class="brand">
            The Landscape Book
          </div>
          <div class="centered">
            <h1>{{ activeItem.title }}</h1>
            <h3 :style="descriptionColor">{{ activeItem.description }}</h3>
            <h6>{{ activeItem.creditTitle }}</h6>
            <h5>{{ activeItem.credit }}</h5>
            <button :style="buttonColor" @click="nextSlide"><i class="fa fa-play"></i></button>
          </div>
          <div class="paginator" @click="nextSlide">
            {{ activeSlide+1 }} of {{ slides.length }} <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" viewBox="0 0 28 10">
    <g>
      <g transform="translate(1147 -1004)">
        <use fill="#303030" transform="translate(-1147 1004)" xlink:href="#path0_fill"/>
      </g>
    </g>
    <defs>
      <path id="path0_fill" d="M27.9 4.309l-2.5-4.1c-.1-.2-.4-.3-.6-.1-.2.1-.3.4-.2.6l2 3.4H.5c-.3-.1-.5.1-.5.4 0 .2.2.5.5.5h26.1l-2.1 3.4c-.1.2-.1.5.2.6h.3c.2 0 .3-.1.4-.2l2.5-4.1c.1-.1.1-.3 0-.4z"/>
    </defs>
  </svg>
          </div>
          <div class="social">
            <ul>
              <li><i class="fa fa-heart-o"></i><span :data-like="activeItem.social.like">{{ activeItem.social.like }}</span></li>
              <li><i class="fa fa-eye"></i><span :data-visit="activeItem.social.visit">{{ activeItem.social.visit }}</span></li>
              <li><i class="fa fa-comment-o"></i><span :data-comment="activeItem.social.comment">{{ activeItem.social.comment }}</span></li>
            </ul>
          </div>
        </div>
      </text-slide>
    </div>
  </div>
  <div class="copyright"><a href="https://dribbble.com/shots/3443280-Fold-animation" target="_blank">Inspired by Fold Animation</a></div>
</div>
