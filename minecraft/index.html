<html>
      <head>
      <script src="https://mcapi.us/scripts/minecraft.js"></script>
    <div class="server-status">
    VanillaWorld is Currently <span class="server-online"></span>
    </div>
    <script>
      MinecraftAPI.getServerStatus('vanillaworld.ddns.net', {
        port: 25565 // optional, only if you need a custom port
      }, function (err, status) {
        if (err) {
          return document.querySelector('.server-status').innerHTML = 'Error loading status';
        }

        // you can change these to your own message!
        document.querySelector('.server-online').innerHTML = status.online ? 'Active.' : 'Sleeping...';
      });
    </script>
      </head>
<body>
 <img src="https://mcapi.us/server/image?ip=vanillaworld.ddns.net">
      
</body>
 
</html>
